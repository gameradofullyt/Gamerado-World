<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Desenhos</title>
<style>
  body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
  }

  h1 {
    text-align: center;
    padding: 20px;
  }

  /* Grid de cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  /* Card */
  .card {
    position: relative;
    cursor: pointer;
    border-radius: 12px;
    overflow: hidden;
    height: 220px;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .card:hover img {
    transform: scale(1.05);
  }

  .card-text {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-weight: bold;
    text-shadow: 0 0 10px black;
    z-index: 2;
    text-align: center;
  }

  /* LIGHTBOX */
  #lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15,15,15,0.9); /* fundo do site visível em volta */
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    cursor: zoom-out;
  }

  #lightbox img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transition: transform 0.3s;
  }

</style>
</head>
<body>

<h1>Meus Desenhos</h1>

<div class="grid">

  <div class="card" data-src="https://i.imgur.com/igElkoc.jpeg">
    <img src="https://i.imgur.com/igElkoc.jpeg" alt="Desenho 1">
  </div>

  <div class="card" data-src="desenhos/desenho2.jpg">
    <img src="desenhos/desenho2.jpg" alt="Desenho 2">
    <div class="card-text">Desenho 2</div>
  </div>

  <div class="card" data-src="desenhos/desenho3.gif">
    <img src="desenhos/desenho3.gif" alt="Desenho 3">
    <div class="card-text">Desenho 3</div>
  </div>

  <div class="card" data-src="desenhos/desenho4.jpg">
    <img src="desenhos/desenho4.jpg" alt="Desenho 4">
    <div class="card-text">Desenho 4</div>
  </div>

  <div class="card" data-src="desenhos/desenho5.png">
    <img src="desenhos/desenho5.png" alt="Desenho 5">
    <div class="card-text">Desenho 5</div>
  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img src="" alt="Visualização">
</div>

<script>
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = lightbox.querySelector('img');
  const cards = document.querySelectorAll('.card');

  cards.forEach(card => {
    card.addEventListener('click', () => {
      const src = card.getAttribute('data-src');
      lightboxImg.src = src;
      lightbox.style.display = 'flex';
    });
  });

  lightbox.addEventListener('click', () => {
    lightbox.style.display = 'none';
    lightboxImg.src = '';
  });
</script>

</body>
</html>
